<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury Clock</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;

        /* Dark luxury background (deep gradient, not flat black) */
        background: radial-gradient(circle at top, #1a1a1a, #050505 80%);
      }

      canvas {
        width: 420px;
        height: 420px;
      }
    </style>
  </head>

  <body>
    <canvas id="canvas" width="420" height="420"></canvas>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const radius = canvas.width / 2;

      /* Centralized theme → easier to tweak design later */
      const theme = {
        gold: "#d4af37",
        goldSoft: "#b8962e",
        dark: "#0b0b0b",
        dial: "#111",
        light: "#f5f5f5",
      };

      function drawClock() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawBezel();
        drawDial();
        drawMarkers();
        drawHands();
        drawCenter();
      }

      /* Outer metallic ring */
      function drawBezel() {
        const grad = ctx.createLinearGradient(
          0,
          0,
          canvas.width,
          canvas.height,
        );

        /* Metallic illusion: alternating light/dark tones */
        grad.addColorStop(0, "#eee");
        grad.addColorStop(0.3, "#888");
        grad.addColorStop(0.5, "#fff");
        grad.addColorStop(0.7, "#666");
        grad.addColorStop(1, "#ddd");

        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.95, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        /* Inner gold ring (luxury detail) */
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.88, 0, Math.PI * 2);
        ctx.strokeStyle = theme.gold;
        ctx.lineWidth = 4;
        ctx.stroke();
      }

      /* Dark dial */
      function drawDial() {
        const grad = ctx.createRadialGradient(
          cx,
          cy,
          radius * 0.2,
          cx,
          cy,
          radius * 0.85,
        );

        /* Slight gradient avoids flatness */
        grad.addColorStop(0, "#1a1a1a");
        grad.addColorStop(1, "#050505");

        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.85, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      /* Hour + minute markers */
      function drawMarkers() {
        ctx.save();
        ctx.translate(cx, cy);

        for (let i = 0; i < 60; i++) {
          ctx.rotate(Math.PI / 30);

          const isHour = i % 5 === 0;

          ctx.beginPath();

          /* Longer + thicker for hour markers */
          ctx.moveTo(0, -radius * (isHour ? 0.68 : 0.74));
          ctx.lineTo(0, -radius * 0.8);

          ctx.lineWidth = isHour ? 4 : 1.5;
          ctx.strokeStyle = isHour ? theme.gold : "rgba(255,255,255,0.2)";
          ctx.stroke();
        }

        ctx.restore();
      }

      /* Hands */
      function drawHands() {
        const now = new Date();

        /* Smooth motion using milliseconds */
        const sec = now.getSeconds() + now.getMilliseconds() / 1000;
        const min = now.getMinutes() + sec / 60;
        const hr = (now.getHours() % 12) + min / 60;

        drawHand((hr * Math.PI) / 6, radius * 0.45, 8, theme.gold);
        drawHand((min * Math.PI) / 30, radius * 0.65, 5, theme.light);

        drawSecondHand((sec * Math.PI) / 30);
      }

      /* Generic hand */
      function drawHand(angle, length, width, color) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);

        /* Subtle shadow adds depth */
        ctx.shadowColor = "rgba(0,0,0,0.4)";
        ctx.shadowBlur = 6;
        ctx.shadowOffsetY = 2;

        ctx.beginPath();
        ctx.moveTo(0, 10); // small tail
        ctx.lineTo(0, -length); // main direction
        ctx.lineWidth = width;
        ctx.lineCap = "round";
        ctx.strokeStyle = color;
        ctx.stroke();

        ctx.restore();
      }

      /* Thin red second hand for contrast */
      function drawSecondHand(angle) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);

        ctx.beginPath();
        ctx.moveTo(0, 15);
        ctx.lineTo(0, -radius * 0.75);
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#c0392b";
        ctx.stroke();

        ctx.restore();
      }

      /* Center cap (important visual anchor) */
      function drawCenter() {
        ctx.beginPath();
        ctx.arc(cx, cy, 8, 0, Math.PI * 2);
        ctx.fillStyle = theme.gold;
        ctx.fill();
      }

      /* requestAnimationFrame → smooth premium motion */
      function animate() {
        drawClock();
        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
